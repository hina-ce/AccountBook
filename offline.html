<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1d5c4c" />
    <title>支出記録 | オフライン</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
        color: #182823;
        background: linear-gradient(145deg, #f4efe6, #dceae1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: rgba(255, 251, 245, 0.95);
        border: 1px solid rgba(24, 40, 35, 0.1);
        box-shadow: 0 24px 72px rgba(29, 49, 43, 0.14);
      }

      h1 {
        margin: 0 0 14px;
        font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
        font-size: clamp(2rem, 6vw, 3rem);
      }

      p {
        margin: 0;
        line-height: 1.8;
        color: #5d6c65;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        margin-top: 22px;
        border-radius: 999px;
        color: #f6f1e9;
        background: linear-gradient(135deg, #1d5c4c, #153d32);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>オフラインです</h1>
      <p>
        記録画面は再表示できます。接続が戻ったら必要に応じて再読み込みし、メール作成を続けてください。
      </p>
      <a href="./index.html">記録画面へ戻る</a>
    </main>
  </body>
</html>
